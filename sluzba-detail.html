<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail služby — Stavební firma s.r.o.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://api.ssps.cajthaml.eu/file/68f3df8a793bb6d00c5da848">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/sluzba-detail.css">
  <script src="js/sluzby-data.js" defer></script>
  <script src="js/sluzba-detail.js" defer></script>
</head>

<body>

  <div id="navbar-placeholder"></div>

  <main>
    <!-- Sekce 1: Úvodní Hero blok s textem a fotkou -->
    <section class="sd-hero">
      <div class="container container-sd-hero">
        <div class="sd-hero-grid">
          <div class="sd-hero-text">
            <span class="section-label" id="detail-label"></span>
            <h1 class="sd-title" id="detail-title"></h1>
            <p class="sd-desc" id="detail-desc-1"></p>
            <div class="sd-hero-actions">
              <a href="kontakt.html" class="btn btn-accent" id="detail-cta-link-1">Mám zájem o službu <i class="fa-solid fa-arrow-right"></i></a>
              <a href="sluzby.html" class="btn btn-outline">Zpět na přehled</a>
            </div>
          </div>
          <div class="sd-hero-image-wrap">
            <img src="" alt="" id="detail-image" class="sd-image">
          </div>
        </div>
      </div>
    </section>

    <!-- Sekce 2: Co práce zahrnuje (Grid boxy) -->
    <section class="sd-features-section bg-light">
      <div class="container">
        <div class="sd-features-header">
          <span class="section-label">Detailní pohled</span>
          <h2 class="section-title">Co naše práce primárně zahrnuje?</h2>
        </div>
        <div class="sd-features-grid" id="detail-features">
          <!-- Features se vloží z JS -->
        </div>
      </div>
    </section>

    <!-- Sekce 3: Doplňkový text a velká CTA (Call to action) -->
    <section class="sd-info-section">
      <div class="container">
        <div class="sd-info-container">
          <div class="sd-info-text">
            <span class="section-label">Kvalita na prvním místě</span>
            <h2 class="section-title">Na čem si zakládáme</h2>
            <p id="detail-desc-2"></p>
          </div>
          <div class="sd-info-cta">
            <div class="cta-box">
              <h3>Začněte s námi stavět</h3>
              <p>Zprostředkujeme vám tu nejvyšší úroveň stavební realizace a transparentní jednání od A do Z.</p>
              <a href="kontakt.html" class="btn btn-accent btn-full" id="detail-cta-link-2">Odeslat nezávaznou poptávku</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
</body>

</html>
